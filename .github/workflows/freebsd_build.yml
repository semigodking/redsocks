name: freebsd_build

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    name: A job to run test FreeBSD
    # env:
    steps:
    - uses: actions/checkout@v2
    - name: Build in FreeBSD
      id: test
      uses: vmactions/freebsd-vm@v1
      with:
        # envs: 'MYTOKEN MYTOKEN2'
        usesh: true
        prepare: pkg install -y curl libevent gmake openssl
        run: |
          pwd
          freebsd-version
          gmake
